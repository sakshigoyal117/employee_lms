<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-in - Nexus Prime Tech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #eef2f5;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .sign-in{
            width: 100%;
            max-width: 520px;
            background-color: #ffffff;
            border-radius: 24px;
            padding: 50px 45px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }
        .brand-logo {
            color: #2b44b8;
            font-weight: 700;
            font-size: 2.2rem;
        }
        .sub-text {
            color: #6c757d;
            font-size: 0.95rem;
        }
        .field-label {
            color: #495057;
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 10px;
        }
        .field-entry{
            width: 100%;
            padding: 14px 18px;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            font-size: 1rem;
            color: #212529;
            transition: all 0.2s ease;
        }
        .field-entry:focus {
            background-color: #ffffff;
            border-color: #2b44b8;
            outline: none;
            box-shadow: 0 0 0 3px rgba(43, 68, 184, 0.1);
        }
        .radio-box {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            padding: 14px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .btn-execute{
            background-color: #2b44b8;
            color: #ffffff;
            font-weight: 600;
            padding: 14px;
            border-radius: 12px;
            border: none;
            transition: background-color 0.2s ease;
            font-size: 1.05rem;
        }
        .btn-execute:hover { background-color: #1e3296; }
        .btn-execute:active { background-color: #152473; }
        .error-message {
            background-color: #fde8e8;
            color: #e53e3e;
            border: 1px solid #f8b4b4;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="sign-in">
    <div class="text-center mb-5">
        <div class="brand-logo mb-2">Nexus Prime Tech</div>
        <div class="sub-text">Welcome back! Please enter your details.</div>
    </div>

    <div id="errorBox" class="error-message mb-4 d-none">
        Incorrect Email Address or Password!
    </div>

    <form id="loginForm" action="login_process.php" method="POST">
        <div class="mb-4">
            <div class="field-label">Login As</div>
            <div class="row g-3">
                <div class="col-6">
                    <label class="radio-box w-100 m-0" for="roleAdmin">
                        <input type="radio" name="role" id="roleAdmin" value="Administrator" class="form-check-input me-2" required>
                        <span class="text-secondary fw-semibold">Admin</span>
                    </label>
                </div>
                <div class="col-6">
                    <label class="radio-box w-100 m-0" for="roleEmployee">
                        <input type="radio" name="role" id="roleEmployee" value="Employee" class="form-check-input me-2" checked>
                        <span class="text-secondary fw-semibold">Employee</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="mb-4">
            <div class="field-label">Email Address</div>
            <input type="email" class="field-entry" id="email" name="email" placeholder="name@gmail.com" required>
        </div>

        <div class="mb-5">
            <div class="field-label">Password</div>
            <input type="password" class="field-entry" id="password" name="password" placeholder="password" required>
        </div>

        <button type="submit" class="btn-execute w-100">Sign in to Account</button>
    </form>

    <div class="text-center mt-5" style="font-size: 0.95rem; color: #555da1;">
        Facing issues? Reach out to <a href="mailto:support@nexusprime.com" class="text-decoration-none fw-semibold" style="color: #2b44b8;">IT Helpdesk</a>
    </div>
</div>

<script>
    
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('error') === '1') {
        document.getElementById('errorBox').classList.remove('d-none');
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
